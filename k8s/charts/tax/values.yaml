backend:
  image:
    repository: ghcr.io/nashtech-garage/yas-tax
    tag: latest

  nameOverride: tax
  fullnameOverride: tax
  databaseName: tax
  ingress:
    enabled: false
  extraEnvs:
    - name: JAVA_TOOL_OPTIONS
      value: "-Xmx512m -Xms256m"
  resources:
    limits:
      memory: 700Mi
    requests:
      memory: 256Mi
      cpu: 100m

