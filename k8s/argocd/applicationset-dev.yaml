apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-dev
  namespace: argocd
spec:
  goTemplate: true
  generators:
  - list:
      elements:
      - service: tax
      - service: product
      - service: cart
      - service: order
      - service: customer
      - service: inventory
      - service: media
      - service: search
      - service: storefront-bff
      - service: backoffice-bff
      - service: storefront-ui
      - service: backoffice-ui
      - service: swagger-ui
      - service: yas-configuration
  template:
    metadata:
      name: 'yas-dev-{{.service}}'
    spec:
      project: default
      sources:
      - repoURL: https://github.com/hbnnnnnnn/yas-project-2
        targetRevision: main
        path: 'k8s/charts/{{.service}}'
        helm:
          parameters:
          - name: backend.serviceMonitor.enabled
            value: "false"
          - name: ui.serviceMonitor.enabled
            value: "false"
          - name: backend.readinessProbe.initialDelaySeconds
            value: "120"
          - name: backend.readinessProbe.failureThreshold
            value: "30"
          - name: backend.livenessProbe.initialDelaySeconds
            value: "180"
          - name: backend.livenessProbe.failureThreshold
            value: "30"
          valueFiles:
          - $values/dev/{{.service}}.values.yaml
      - repoURL: https://github.com/hbnnnnnnn/yas-gitops
        targetRevision: HEAD
        ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: dev
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
